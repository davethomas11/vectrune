version: 1
status: starter
examples:
  - id: example.rest.minimal
    title: Minimal REST App
    summary: Smallest complete REST app example with one GET route and one POST route.
    source_path: examples/app.rune
    app_type: REST
    concepts:
      - app section
      - route declaration
      - run blocks
      - log builtin
      - parse-json builtin
      - respond builtin
    builtins:
      - log
      - parse-json
      - respond
    runtime_context:
      - body
      - ___last_exec_result___
    cli_workflows:
      - vectrune examples/app.rune
    related_knowledge:
      - product.overview
      - language.core
      - runtime.cli
    status: recommended
    notes:
      - Good first example for teaching route syntax and step execution.
  - id: example.data.skateboarders
    title: Skateboarder Data Document
    summary: Simple section/record example useful for parser and CLI transform/calculate teaching.
    source_path: examples/skateboarders.rune
    app_type: data-document
    concepts:
      - sections
      - records
      - repeated structured entries
      - CLI transform
      - CLI calculate
    builtins: [ ]
    runtime_context: [ ]
    cli_workflows:
      - vectrune examples/skateboarders.rune --calculate "avg Skateboarder.age"
      - vectrune examples/skateboarders.rune --transform "@Skaters name:[@Skateboarder.name]"
    test_refs:
      - tests/integration_cli.rs
    related_knowledge:
      - product.overview
      - language.core
      - runtime.cli
    status: recommended
    notes:
      - Lowest-complexity example for teaching the document model.
  - id: example.rest.user-api
    title: User API
    summary: Schema-backed REST API using CSV storage, validation, path params, and Swagger-enabled configuration.
    source_path: examples/user_api.rune
    companion_files:
      - examples/users.csv
    app_type: REST
    concepts:
      - app section
      - schema definitions
      - route methods
      - request body parsing
      - validation
      - path params
      - placeholder expansion in log messages
      - swagger-enabled REST docs
    builtins:
      - log
      - parse-json
      - validate
      - csv.read
      - csv.write
      - csv.append
      - respond
    runtime_context:
      - body
      - path.params
      - id
      - ___last_exec_result___
    cli_workflows:
      - vectrune examples/user_api.rune
    test_refs:
      - tests/integration_user_api.rs
      - tests/logger_parameter_expansion_test.rs
    related_knowledge:
      - product.overview
      - language.core
      - runtime.cli
      - reference.builtins
      - reference.runtime-context
      - reference.app-types
    status: recommended
    notes:
      - Primary example for teaching REST request lifecycle behavior.
  - id: example.graphql.book-api
    title: Book GraphQL API
    summary: GraphQL example using in-memory state, queries, mutations, and derived IDs.
    source_path: examples/book_graphql.rune
    app_type: GraphQL
    concepts:
      - graphql queries
      - graphql mutations
      - memory sections
      - collection queries
      - max-based id generation
      - object construction
      - lambda packaging relevance
    builtins:
      - memory.get
      - memory.append
      - return
    runtime_context:
      - ___last_exec_result___
    cli_workflows:
      - vectrune examples/book_graphql.rune
      - vectrune lambda package --rune examples/book_graphql.rune --binary <path> --mode zip --output <artifact>
    test_refs:
      - tests/integration_book_graphql.rs
      - tests/lambda_package.rs
    related_knowledge:
      - product.overview
      - language.core
      - runtime.cli
      - reference.app-types
    status: recommended
    notes:
      - Best starter example for GraphQL and Lambda-adjacent workflows.
  - id: example.websocket.worm-game
    title: Multiplayer Worm Game
    summary: Real-time WebSocket example featuring event dispatch, direct self-identification messages, rotating player colors, worm growth up to length 10, score tracking, and an HTML5 canvas frontend.
    source_path: examples/worm_game/worm_game.rune
    companion_files:
      - examples/worm_game/assets/index.html
      - examples/worm_game/worm_colors.json
    app_type: WebSocket
    concepts:
      - websocket sections
      - on_connect and on_disconnect handlers
      - event-based JSON dispatch
      - json-backed palette loading
      - ws.id builtin
      - ws.send builtin
      - ws.broadcast builtin
      - delete builtin for cleanup
      - memory state
      - object path mutation
      - client/server state synchronization
      - rotating color palette assignment
      - growth capped at 10 segments
      - in-page score display
      - frontend static hosting
    builtins:
      - json.read
      - log
      - get-memory
      - set-memory
      - ws.id
      - ws.send
      - ws.broadcast
    runtime_context:
      - ws_id
      - body
    cli_workflows:
      - vectrune examples/worm_game/
    related_knowledge:
      - product.overview
      - language.core
      - runtime.cli
      - reference.app-types
      - reference.builtins
    status: emerging
    notes:
      - Primary example for teaching WebSocket and real-time patterns.
      - Demonstrates JSON-based event routing through @Event sections.
      - The frontend receives a direct self-identification message so it can sync local movement with server state and render player scores.
      - The example loads its rotating color palette from `worm_colors.json` via `json.read`.
      - Player colors rotate through a fixed palette as new worms join.
      - Worm length grows when food is eaten and is capped at 10.
      - Player data is cleaned up from state when they disconnect using the `delete` builtin.
  - id: example.frontend.tic-tac-toe-proposal
    title: Tic Tac Toe Frontend Proposal
    summary: Proposed rune-web example showing multi-file frontend authoring with imports, page structure, reusable style tokens and presets, and client logic blocks.
    source_path: examples/tic_tac_toe/tic_tac_toe.rune
    companion_files:
      - examples/tic_tac_toe/parts/style.rune
      - examples/tic_tac_toe/parts/logic.rune
      - examples/tic_tac_toe/preview.html
    app_type: REST
    concepts:
      - frontend rune-web proposal
      - import declarations
      - page sections
      - style tokens
      - style presets
      - logic actions
      - multi-file rune composition
    builtins: [ ]
    runtime_context: [ ]
    cli_workflows:
      - vectrune examples/tic_tac_toe/ -o json
    related_knowledge:
      - language.core
      - runtime.cli
      - reference.app-types
    status: emerging
    notes:
      - Demonstrates importing a directory of `.rune` files before parsing the root document.
      - Style and logic sections are split into companion files under `examples/tic_tac_toe/parts/`.
notes:
  - Prefer examples already backed by tests or central README workflows.
  - Add auth, datasource, and memory API examples once their reference pages are added.
